name: Check Geph5 upstream compatibility

on:
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Compare with geph-official/geph5
        run: sh scripts/check-upstream-compat.sh
