name: Build ImmortalWrt package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-x86-64:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      SDK_URL: https://downloads.immortalwrt.org/releases/25.12.0/targets/x86/64/immortalwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
      SDK_SHA256: c228059aa1e58c3b3ae58ce8dcc7549fd08379d8e231daf80fcca15b677564cb
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3 python3-setuptools rsync swig unzip wget zstd

      - name: Download ImmortalWrt 25.12 x86/64 SDK
        run: |
          wget -q --show-progress "$SDK_URL" -O sdk.tar.zst
          echo "$SDK_SHA256  sdk.tar.zst" | sha256sum -c -
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk
          rm -f sdk.tar.zst

      - name: Prepare feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base
          ./scripts/feeds install ca-certificates

      - name: Add package
        run: |
          mkdir -p sdk/package/luci-app-geph5
          rsync -a --delete --exclude='.git' --exclude='sdk' --exclude='artifacts' ./ sdk/package/luci-app-geph5/

      - name: Build package
        run: |
          cd sdk
          echo 'CONFIG_PACKAGE_luci-app-geph5=m' > .config
          make defconfig
          make package/luci-app-geph5/compile V=s -j"$(nproc)"

      - name: Collect package
        run: |
          mkdir -p artifacts
          find sdk/bin -type f \( -name 'luci-app-geph5*.apk' -o -name 'luci-app-geph5*.ipk' \) -exec cp -v {} artifacts/ \;
          test -n "$(find artifacts -type f -print -quit)"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: luci-app-geph5-immortalwrt-25.12-x86-64
          path: artifacts/*
          if-no-files-found: error
